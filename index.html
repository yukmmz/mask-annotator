<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Mask Annotator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- 上部ツールバー -->
    <header id="toolbar">
      <div class="group">
        <button id="btnLoadFrames" class="primary">画像を読込</button>
        <button id="btnLoadBg">背景</button>
        <span id="bgState" class="tag off">bg:なし</span>
        <label>対象
          <input id="objInput" type="text" list="objSuggest" placeholder="必須"
                 inputmode="latin" autocapitalize="off" autocomplete="off" />
        </label>
        <datalist id="objSuggest">
          <option value="robot"></option>
          <option value="box"></option>
          <option value="mech"></option>
          <option value="wing"></option>
        </datalist>
        <button id="btnExport" class="primary">ZIP出力</button>
        <span class="menu-wrap">
          <button id="btnMore" title="その他のツール">その他 &#8943;</button>
          <!-- 低頻度コントロール（タップで開くポップオーバー。画面は狭めない） -->
          <div id="moreMenu" hidden>
            <button id="btnImport">マスク読込</button>
            <label>pack <input id="packName" type="text" placeholder="(背景から自動)" /></label>
            <button id="btnCopyPrev">前マスクをコピー</button>
            <button id="btn3pt">3点(翼)</button>
            <button id="btnAuto">Auto(link)</button>
            <button id="btnClear">Clear</button>
            <button id="btnDiff">Diff表示</button>
          </div>
        </span>
      </div>
    </header>

    <!-- 常時表示クイックバー（折りたたんでも残す頻用コントロール） -->
    <div id="quickbar">
      <button id="btnPrev">◀</button>
      <span id="frameLabel" class="tag">- / -</span>
      <button id="btnNext">▶</button>
      <button id="btnFit">Fit</button>
      <button id="btnLasso" title="囲んだ範囲の外側をADD/REMOVE">外側</button>
      <!-- Auto(link)のピン留めON時のみ表示。Auto実行/適用をクイックバーに常駐 -->
      <span id="autoQuick" class="group" hidden>
        <button id="btnAutoRunQ" class="primary">Auto実行</button>
        <button id="btnAutoApplyQ">Auto適用</button>
      </span>
      <label>brush <input id="sBrush" type="range" min="2" max="60" step="1" value="8" />
        <span id="vBrush">8</span>px</label>
      <label>sim <input id="sSim" type="range" min="0" max="120" step="1" value="20" />
        <span id="vSim">20</span></label>
      <label>reach <input id="sReach" type="range" min="0" max="200" step="1" value="30" />
        <span id="vReach">30</span>px</label>
      <span id="status" class="status"></span>
      <!-- 右端に寄せる頻用ボタン（一番右=ADD/REMOVE, その左=Undo） -->
      <div class="group qright">
        <button id="btnUndo">Undo</button>
        <button id="btnMode" class="mode-add">ADD</button>
      </div>
    </div>

    <!-- 移動/回転バー（前マスクコピー中のみ表示） -->
    <div id="transformBar" hidden>
      <span class="tag">マスク移動/回転</span>
      <span id="rotReadout" class="tag">0&deg;</span>
      <button id="btnTransformApply" class="primary">確定</button>
      <button id="btnTransformCancel">取消</button>
      <span class="barhint">Pencilでドラッグ=移動 / 上の&#9711;ハンドルをドラッグ=回転</span>
    </div>

    <!-- 翼3点(楕円)バー（3点モード中のみ表示） -->
    <div id="threePointBar" hidden>
      <span class="tag">翼3点(楕円)</span>
      <button id="btn3ptUndo">1点戻す</button>
      <button id="btn3ptClear">クリア</button>
      <button id="btn3ptApply" class="primary">確定</button>
      <button id="btn3ptCancel">取消</button>
      <span class="barhint">順: center &rarr; tip &rarr; trailing をPencilでタップ</span>
    </div>

    <!-- 自動シード(link)バー（Auto(link)トグルで表示） -->
    <div id="autoBar" hidden>
      <span class="tag">Auto(link)</span>
      <button id="btnAutoPin" title="Auto実行/Auto適用をクイックバーに常駐">&#128204;</button>
      <label>motion <input id="aMotion" type="range" min="0" max="150" step="1" value="45" /><span id="vMotion">45</span></label>
      <label>white <input id="aWhite" type="range" min="0" max="255" step="1" value="110" /><span id="vWhite">110</span></label>
      <label>yellow <input id="aYellow" type="range" min="0" max="120" step="1" value="35" /><span id="vYellow">35</span></label>
      <label>min-area <input id="aMinArea" type="range" min="0" max="3000" step="50" value="400" /><span id="vMinArea">400</span></label>
      <button id="btnAutoRun" class="primary">Auto実行</button>
      <button id="btnAutoApply">適用</button>
      <button id="btnAutoClose">閉じる</button>
    </div>

    <!-- 描画エリア -->
    <main id="stage">
      <canvas id="view"></canvas>
      <div id="hint">「画像を読込」でキーフレーム(frame_*.png)と背景を選択。<br />
        Apple Pencilで描画 / 指でズーム・移動。</div>
      <button id="btnChrome" class="chrome-toggle" type="button">隠す &#9650;</button>
    </main>
  </div>

  <!-- 複数ファイル選択（非表示） -->
  <input id="fileFrames" type="file" accept="image/*" multiple hidden />
  <input id="fileBg" type="file" accept="image/*" hidden />
  <!-- マスクZIP取り込み（再開） -->
  <input id="fileImport" type="file" accept=".zip" multiple hidden />

  <!-- JSZip（ZIP生成）。MVP1はCDN、MVP2でオフライン用にvendor化予定 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="brush.js"></script>
  <script src="mask_io.js"></script>
  <script src="mask_transform.js"></script>
  <script src="wing_ellipse.js"></script>
  <script src="linkseed.js"></script>
  <script src="lasso.js"></script>
  <script src="app.js"></script>
</body>
</html>
